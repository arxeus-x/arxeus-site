<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arxeus</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <style>
        body {
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', sans-serif; color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 24px;
            text-align: center; width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform-style: preserve-3d;
        }

        #clock { font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px; letter-spacing: 1px; }
        h1 { margin: 10px 0; font-size: 2rem; }
        p { opacity: 0.7; margin-bottom: 30px; line-height: 1.5; }

        .links { display: flex; gap: 10px; justify-content: center; }
        a {
            padding: 12px 20px; 
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; 
            text-decoration: none; font-size: 0.9rem;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        a:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div class="card" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-gyroscope="true">
        <div id="clock">00:00:00</div>
        <h1>Arxeus</h1>
        <p>maybe alive idk<br>uhmm.. hobby?</p>
        <div class="links">
            <a href="https://t.me/arxeus_x" target="_blank">Telegram</a>
            <a href="https://github.com/arxeus-x" target="_blank">GitHub</a>
        </div>
    </div>

    <script>
        VanillaTilt.init(document.querySelector(".card"), { 
            max: 15, 
            speed: 400, 
            gyroscope: true,
            gyroscopeMinAngleX: -45,
            gyroscopeMaxAngleX: 45
        });

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
